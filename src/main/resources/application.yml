server:
  port: 8080

spring:
  application:
    name: transaction-aggregation-api

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:transactions_db}
    username: ${DB_USERNAME:txn_user}
    password: ${DB_PASSWORD:txn_pass}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  security:
    oauth2:
      resourceserver:
        jwt:
          jwks-uri: ${JWKS_URI:http://localhost:9000/default/jwks}

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      show-details: always

ingestion:
  interval-ms: 300000

logging:
  level:
    za.co.samrepa: INFO
