spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false

  flyway:
    enabled: false

  security:
    oauth2:
      resourceserver:
        jwt:
          jwks-uri: http://localhost:9000/default/jwks  # JwtDecoder is mocked in tests — never reached

ingestion:
  interval-ms: 999999999
